apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp-qa

resources:
  - ../../base
  - argocd-application.yaml

namePrefix: qa-

commonLabels:
  environment: qa

patches:
  - path: rollout-patch.yaml
    target:
      kind: Rollout
      name: nginx
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: nginx-index-html-configmap
  - path: httproute-patch.yaml
    target:
      kind: HTTPRoute
      name: my-httproute
