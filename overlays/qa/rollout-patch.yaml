apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx
  namespace: myapp-qa
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: nginx-chart
          image: amaljithh/green-page:v1
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {duration: 5}
        - analysis:
            templates:
              - templateName: blue-green-check
        - setWeight: 50
        - pause: {duration: 10}
        - setWeight: 100
